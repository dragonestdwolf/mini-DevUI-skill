<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Component Test (v1)</title>
    <style>
        /* Global Reset */
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f7f8fa;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Test Container */
        .test-container {
            width: 800px;
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 24px;
            color: #252B3A;
            border-bottom: 1px solid #DFE1E6;
            padding-bottom: 12px;
        }

        /* --- Included Form Template Styles --- */
        .devui-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .devui-form-item {
            display: flex;
        }

        /* Horizontal Layout */
        .devui-form.horizontal .devui-form-item {
            flex-direction: row;
            align-items: flex-start;
            gap: 16px;
        }

        .devui-form.horizontal .devui-form-label {
            width: 120px;
            text-align: right;
            padding-top: 5px;
            /* Align with 32px input */
        }

        /* Vertical Layout */
        .devui-form.vertical .devui-form-item {
            flex-direction: column;
            gap: 8px;
        }

        .devui-form.vertical .devui-form-label {
            width: 100%;
            text-align: left;
        }

        .devui-form-label {
            font-size: 14px;
            color: var(--devui-text, #252B3A);
            line-height: 22px;
            flex-shrink: 0;
            font-weight: 500;
        }

        .devui-form-label.required::before {
            content: '*';
            color: var(--devui-danger, #F66F6A);
            margin-right: 4px;
        }

        .devui-form-label-help {
            color: var(--devui-aide-text, #8A8E99);
            margin-left: 4px;
            font-size: 12px;
            font-weight: 400;
        }

        .devui-form-control {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .devui-form-help-message {
            font-size: 12px;
            line-height: 1.5;
            color: var(--devui-danger, #F66F6A);
            margin-top: 4px;
            min-height: 18px;
        }

        /* --- Included Input Template Styles (for Demo) --- */
        .devui-input-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            height: 32px;
            border-radius: 4px;
            padding: 0 12px;
            transition: all 0.2s;
            background-color: #FFFFFF;
            border: 1px solid #ADB0B8;
            /* devui-form-control-line */
            box-sizing: border-box;
        }

        .devui-input-wrapper:hover {
            border-color: #575D6C;
            box-shadow: 0 0 0 4px rgba(94, 124, 224, 0.08);
        }

        .devui-input-wrapper.active,
        .devui-input-wrapper:focus-within {
            border-color: #5E7CE0;
            /* devui-form-control-line-active */
            box-shadow: 0 0 0 4px rgba(94, 124, 224, 0.08);
        }

        .devui-input-wrapper.error {
            border-color: #F66F6A;
            /* devui-danger */
            background-color: #FFEEDD;
        }

        .devui-input {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            padding: 0;
            font-size: 14px;
            color: #252B3A;
            line-height: 22px;
        }

        .devui-input::placeholder {
            color: #8A8E99;
        }

        /* Mock Textarea */
        .devui-textarea-wrapper {
            padding: 8px 12px;
            height: auto;
            min-height: 80px;
            align-items: flex-start;
        }

        .devui-textarea {
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
    </style>
</head>

<body>

    <!-- Test Case 1: Horizontal Form -->
    <div class="test-container">
        <h2>Horizontal Layout Form</h2>
        <div class="devui-form horizontal">

            <!-- Item 1: Name (Required) -->
            <div class="devui-form-item">
                <label class="devui-form-label required">Member Name</label>
                <div class="devui-form-control">
                    <!-- Input Component -->
                    <div class="devui-input-wrapper">
                        <input type="text" class="devui-input" placeholder="Enter member name">
                    </div>
                </div>
            </div>

            <!-- Item 2: Email (Optional) -->
            <div class="devui-form-item">
                <label class="devui-form-label">
                    Email
                    <span class="devui-form-label-help">(Optional)</span>
                </label>
                <div class="devui-form-control">
                    <div class="devui-input-wrapper">
                        <input type="email" class="devui-input" placeholder="Enter email address">
                    </div>
                </div>
            </div>

            <!-- Item 3: Age (Number Input) -->
            <div class="devui-form-item">
                <label class="devui-form-label">Age</label>
                <div class="devui-form-control">
                    <div class="devui-input-wrapper" style="width: 120px;">
                        <input type="number" class="devui-input" value="18">
                    </div>
                </div>
            </div>

            <!-- Item 4: Error State -->
            <div class="devui-form-item">
                <label class="devui-form-label required">Username</label>
                <div class="devui-form-control">
                    <div class="devui-input-wrapper error">
                        <input type="text" class="devui-input" value="user!">
                    </div>
                    <div class="devui-form-help-message">Special characters are not allowed.</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Test Case 2: Vertical Form -->
    <div class="test-container">
        <h2>Vertical Layout Form</h2>
        <div class="devui-form vertical">

            <!-- Item 1: Title -->
            <div class="devui-form-item">
                <label class="devui-form-label required">Project Title</label>
                <div class="devui-form-control">
                    <div class="devui-input-wrapper">
                        <input type="text" class="devui-input" placeholder="Enter project title">
                    </div>
                </div>
            </div>

            <!-- Item 2: Description (Textarea) -->
            <div class="devui-form-item">
                <label class="devui-form-label">Description</label>
                <div class="devui-form-control">
                    <div class="devui-input-wrapper devui-textarea-wrapper">
                        <textarea class="devui-input devui-textarea" placeholder="describe the project..."></textarea>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
