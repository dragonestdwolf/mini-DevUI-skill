<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeadInfo Render Test V2</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f5f8;
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
        }

        /* Additional Container Wrap to test overflow constraints */
        .page-wrapper {
            width: 800px;
            /* Force a limited width to test text overflow */
            background: #ffffff;
            padding: 24px;
            border: 1px dashed #ccc;
        }

        /* ----------------- Template Styles ----------------- */
        .devui-headinfo-container {
            display: flex;
            align-items: center;
            height: 48px;
        }

        /* 后退按钮 */
        .devui-headinfo-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin-right: 16px;
        }

        .devui-icon-back {
            width: 20px;
            height: 20px;
            background-color: var(--devui-text, #252b3a);
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/back.svg');
            mask-image: url('../../../icon/miniDev-icon/action/back.svg');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        /* Logo */
        .devui-headinfo-logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            overflow: hidden;
            margin-right: 12px;
            box-shadow: inset 0 0 0 1px #FEE1E7;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background-color: var(--devui-base-bg, #ffffff);
        }

        .devui-headinfo-logo img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 主内容 */
        .devui-headinfo-main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 48px;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }

        .devui-headinfo-row1 {
            display: flex;
            align-items: center;
            height: 28px;
            min-width: 0;
        }

        .devui-headinfo-title-group {
            display: flex;
            align-items: center;
            line-height: 28px;
            min-width: 0;
        }

        /* 文本与格式 */
        .devui-text-brand {
            font-size: 20px;
            font-weight: 400;
            color: var(--devui-text-weak, #5a6272);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .devui-text-slash {
            font-size: 20px;
            font-weight: 300;
            color: var(--devui-border, #adb0b8);
            margin: 0 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .devui-text-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--devui-text, #252b3a);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .devui-headinfo-caret {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .devui-icon-dropdown {
            width: 14px;
            height: 14px;
            background-color: var(--devui-text, #252b3a);
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/chevron-down.svg');
            mask-image: url('../../../icon/miniDev-icon/action/chevron-down.svg');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        /* Badges 区域 */
        .devui-headinfo-badges {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 14px;
            flex-shrink: 0;
        }

        /* Metadata 行 */
        .devui-headinfo-row2 {
            display: flex;
            align-items: center;
            height: 20px;
            min-width: 0;
        }

        .devui-text-meta {
            font-size: 14px;
            color: var(--devui-placeholder, #7a808c);
            line-height: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Built-in badges elements for the template */
        .devui-badge-health {
            display: inline-flex;
            height: 22px;
            border-radius: 4px;
            overflow: hidden;
            align-items: center;
        }

        .devui-badge-health-label {
            background-color: #5A6272;
            color: var(--devui-base-bg, #ffffff);
            padding: 0 8px;
            font-size: 12px;
            font-weight: 400;
            line-height: 22px;
            white-space: nowrap;
        }

        .devui-badge-health-value {
            background-color: #9FA4B0;
            color: var(--devui-base-bg, #ffffff);
            padding: 0 8px;
            font-size: 12px;
            font-weight: 400;
            line-height: 22px;
            white-space: nowrap;
        }

        .devui-badge-tag {
            display: inline-flex;
            height: 22px;
            background-color: var(--devui-list-item-hover-bg, #f3f5f8);
            color: var(--devui-text, #252b3a);
            border-radius: 4px;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 400;
            align-items: center;
            line-height: 22px;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="devui-headinfo-container">
            <!-- 后退块 -->
            <div class="devui-headinfo-back" title="返回">
                <i class="devui-icon-back"></i>
            </div>

            <!-- 标头 Logo -->
            <div class="devui-headinfo-logo">
                <img src="https://dummyimage.com/100x100/eaeaea/5c5c5c&text=100X100" alt="Logo">
            </div>

            <!-- 文字与状态主干区 -->
            <div class="devui-headinfo-main">
                <!-- 第 1 行：品牌分类 / 名称 / 下拉操作及标签群合辑 -->
                <div class="devui-headinfo-row1">
                    <div class="devui-headinfo-title-group">
                        <span class="devui-text-brand">LONG_TEST_BRAND_NAME_OVERFLOW</span>
                        <span class="devui-text-slash">/</span>
                        <span class="devui-text-name">EXTREMELY_LONG_NAME_TESTING_OVERFLOW_WITH_MANY_CHARACTERS</span>

                        <div class="devui-headinfo-caret">
                            <i class="devui-icon-dropdown"></i>
                        </div>
                    </div>

                    <div class="devui-headinfo-badges">
                        <div class="devui-badge-health">
                            <span class="devui-badge-health-label">TEST_METRIC</span>
                            <span class="devui-badge-health-value">99.9%</span>
                        </div>
                        <div class="devui-badge-tag">TAG_WITH_VERY_LONG_TEXT_TEST</div>
                    </div>
                </div>

                <!-- 第 2 行：附属描述与 ID -->
                <div class="devui-headinfo-row2">
                    <span class="devui-text-meta">Repository ID: [SUPER_LONG_TEST_ID]
                        VERY_LONG_METADATA_DESCRIPTION_TO_SEE_HOW_SECOND_ROW_BEHAVES_WHEN_SPACE_IS_LIMITED_AND_WRAPPING_MIGHT_OCCUR</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
