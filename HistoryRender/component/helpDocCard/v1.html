<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDocCard - v1 测试页</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- 1. 注入 Design Tokens -->
    <style>
        :root {
            --devui-text: #252B3A;
            --devui-placeholder: #8A8E99;
            --devui-base-bg: #FFFFFF;
            --devui-shadow-length-base: 0 1px 6px 0 rgba(0, 0, 0, 0.08);
            --devui-font-size-sm: 12px;
            --devui-font-size-lg: 16px;
            --devui-border-radius-xl: 16px;
        }

        body {
            margin: 0;
            padding: 50px;
            background-color: #F3F6F8;
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
        }

        .test-case {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .test-title {
            font-size: 13px;
            font-family: monospace;
            color: #999;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 12px;
            border-radius: 4px;
        }
    </style>

    <!-- 2. 注入 Template CSS (-tem.html) -->
    <style>
        .devui-helpDocCard {
            width: 384px;
            background-color: var(--devui-base-bg, #FFFFFF);
            padding: 16px 20px 20px 20px;
            border-radius: var(--devui-border-radius-xl, 16px);
            box-shadow: var(--devui-shadow-length-base, 0 1px 6px 0 rgba(0, 0, 0, 0.08));
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: flex-start;
        }

        .devui-helpDoc-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .devui-helpDoc-title {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            font-weight: 700;
            font-size: var(--devui-font-size-lg, 16px);
            color: var(--devui-text, #252B3A);
            line-height: 24px;
            white-space: nowrap;
        }

        .devui-helpDoc-all-link {
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            cursor: pointer;
        }

        .devui-helpDoc-all-text {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 400;
            font-size: var(--devui-font-size-sm, 12px);
            color: var(--devui-placeholder, #8A8E99);
            line-height: 20px;
        }

        .devui-helpDoc-all-icon {
            width: 16px;
            height: 16px;
            background-color: var(--devui-placeholder, #8A8E99);
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/next.svg');
            mask-image: url('../../../icon/miniDev-icon/action/next.svg');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            flex-shrink: 0;
        }

        .devui-helpDoc-grid {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 0;
            align-items: center;
            flex-shrink: 0;
        }

        .devui-helpDoc-item {
            width: 86px;
            height: 76px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            text-decoration: none;
        }

        .devui-helpDoc-item:hover {
            background-color: rgba(0, 0, 0, 0.02);
            border-radius: 8px;
        }

        .devui-helpDoc-item-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            background-color: var(--devui-text, #252B3A);
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .devui-helpDoc-item-label {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 400;
            font-size: var(--devui-font-size-sm, 12px);
            color: var(--devui-text, #252B3A);
            line-height: 20px;
            text-align: center;
            white-space: nowrap;
        }

        /* Test specific icons mapping */
        .devui-helpDoc-icon--product-intro {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/documentation.svg');
            mask-image: url('../../../icon/miniDev-icon/action/documentation.svg');
        }

        .devui-helpDoc-icon--quick-start {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/execute.svg');
            mask-image: url('../../../icon/miniDev-icon/action/execute.svg');
        }

        .devui-helpDoc-icon--user-guide {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/user-guide.svg');
            mask-image: url('../../../icon/miniDev-icon/action/user-guide.svg');
        }

        .devui-helpDoc-icon--best-practice {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/star.svg');
            mask-image: url('../../../icon/miniDev-icon/action/star.svg');
        }

        .devui-helpDoc-icon--faq {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/help.svg');
            mask-image: url('../../../icon/miniDev-icon/action/help.svg');
        }

        .devui-helpDoc-icon--theory {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/readme.svg');
            mask-image: url('../../../icon/miniDev-icon/action/readme.svg');
        }

        .devui-helpDoc-icon--reference {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/description-1.svg');
            mask-image: url('../../../icon/miniDev-icon/action/description-1.svg');
        }

        .devui-helpDoc-icon--api {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/api.svg');
            mask-image: url('../../../icon/miniDev-icon/action/api.svg');
        }
    </style>
</head>

<body>

    <!-- Case 1: 标准 9 宫格满分渲染（Figma 效果） -->
    <div class="test-case">
        <div class="test-title">Case 1: 标准渲染 (9项分类)</div>

        <div class="devui-helpDocCard">
            <div class="devui-helpDoc-header">
                <div class="devui-helpDoc-title">帮助文档</div>
                <a href="#all" class="devui-helpDoc-all-link">
                    <span class="devui-helpDoc-all-text">所有文档</span>
                    <span class="devui-helpDoc-all-icon"></span>
                </a>
            </div>

            <div class="devui-helpDoc-grid">
                <!-- 第一排 -->
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--product-intro"></span>
                    <span class="devui-helpDoc-item-label">产品介绍</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--quick-start"></span>
                    <span class="devui-helpDoc-item-label">快速入门</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--user-guide"></span>
                    <span class="devui-helpDoc-item-label">使用指南</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--best-practice"></span>
                    <span class="devui-helpDoc-item-label">最佳实践</span>
                </a>
                <!-- 第二排 -->
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--faq"></span>
                    <span class="devui-helpDoc-item-label">常见问题</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--theory"></span>
                    <span class="devui-helpDoc-item-label">理论实践</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--reference"></span>
                    <span class="devui-helpDoc-item-label">通用参考</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-icon--api devui-helpDoc-item-icon"></span>
                    <span class="devui-helpDoc-item-label">平台API</span>
                </a>
                <!-- 第三排 -->
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-icon--api devui-helpDoc-item-icon"></span>
                    <span class="devui-helpDoc-item-label">业务API</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Case 2: 数量极少适应（仅 3 项） -->
    <div class="test-case">
        <div class="test-title">Case 2: 缺省模式 (仅3项高度自适应撑开)</div>

        <div class="devui-helpDocCard">
            <div class="devui-helpDoc-header">
                <div class="devui-helpDoc-title">帮助资源库</div>
                <a href="#all" class="devui-helpDoc-all-link">
                    <span class="devui-helpDoc-all-text">前往</span>
                    <span class="devui-helpDoc-all-icon"></span>
                </a>
            </div>

            <div class="devui-helpDoc-grid">
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--quick-start"></span>
                    <span class="devui-helpDoc-item-label">快速开始</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--faq"></span>
                    <span class="devui-helpDoc-item-label">FAQ大全</span>
                </a>
                <a href="#item" class="devui-helpDoc-item">
                    <span class="devui-helpDoc-item-icon devui-helpDoc-icon--api"></span>
                    <span class="devui-helpDoc-item-label">开放接口</span>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
