<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuCard v1 Test Component</title>
    <style>
        /* Context Layout for testing only */
        body {
            background-color: #F3F6F8;
            padding: 50px;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .test-case {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .test-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-family: monospace;
        }

        /* 
           命名空间原则：所有 Class 必须以 devui-menuCard 开头 
           Token 原则：必须使用 var(--devui-token) 形式
        */
        .devui-menuCard {
            width: 240px;
            height: 36px;
            padding: 0 8px;
            box-sizing: border-box;
            background-color: transparent;
            border-radius: var(--devui-border-radius-md, 8px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        /* Hover & Active / Selected */
        .devui-menuCard:hover,
        .devui-menuCard.active {
            background-color: var(--devui-base-bg, #FFFFFF);
            box-shadow: var(--devui-shadow-length-base, 0 1px 6px 0 rgba(0, 0, 0, 0.08));
        }

        .devui-menuCard-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            background-color: var(--devui-icon-text, #252B3A);
            /* Set actual mask in implementation via {{iconClass}} or an inline style */
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .devui-menuCard-text {
            font-size: var(--devui-font-size-md, 14px);
            font-weight: 400;
            color: var(--devui-text, #252B3A);
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Ad-hoc icons for testing */
        .icon-star {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/star.svg');
            mask-image: url('../../../icon/miniDev-icon/action/star.svg');
        }

        .icon-date {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/date.svg');
            mask-image: url('../../../icon/miniDev-icon/action/date.svg');
        }
    </style>
</head>

<body>

    <div class="test-case">
        <span class="test-label">Case 1: Normal State & Normal String</span>
        <a class="devui-menuCard " href="javascript:void(0)">
            <span class="devui-menuCard-icon icon-date"></span>
            <span class="devui-menuCard-text">概览数据看板</span>
        </a>
    </div>

    <div class="test-case">
        <span class="test-label">Case 2: Extreme Long Text Overflow</span>
        <a class="devui-menuCard " href="javascript:void(0)">
            <span class="devui-menuCard-icon icon-star"></span>
            <span class="devui-menuCard-text">这是一个由极其长极其长极其长的中英文混合字符组成的菜单项名称为了测试溢出AAAAABBBBB</span>
        </a>
    </div>

    <div class="test-case">
        <span class="test-label">Case 3: Active State</span>
        <a class="devui-menuCard active" href="javascript:void(0)">
            <span class="devui-menuCard-icon icon-date"></span>
            <span class="devui-menuCard-text">API服务测试项目</span>
        </a>
    </div>

    <div class="test-case">
        <span class="test-label">Case 4: Empty string logic & missing values</span>
        <a class="devui-menuCard " href="javascript:void(0)">
            <span class="devui-menuCard-icon "></span>
            <span class="devui-menuCard-text"></span>
        </a>
    </div>

</body>

</html>
