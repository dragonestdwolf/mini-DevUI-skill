<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevUI Table Header Block Component Test (v6)</title>
    <style>
        /* CSS Variables to map standard design tokens */
        :root {
            --devui-brand: #5E7CE0;
            --devui-text: #252b3a;
            --devui-text-weak: #575D6C;
            --devui-base-bg: #FFFFFF;
            --devui-border: #DFE1E6;
            --devui-primary: #5e7ce0;
        }

        /* Test Canvas setup */
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #e5e5e5;
            /* Distinct dark background for testing component boundary */
            color: var(--devui-text);
        }

        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            /* Container styling omitted to ensure the component itself stands out properly */
        }

        /* --- Component CSS Paste from Spec --- */
        .devui-block-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 16px;
            height: 48px;
            /* Breathing room */
            background-color: #F3F6F8;
            /* Light gray background to distinguish the toolbar floating surface */
            border-radius: 4px;
        }

        .devui-block-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .devui-block-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            /* Take remaining space */
            min-width: 0;
            /* Prevent overflow */
        }

        /* Base Icon Rule for Buttons & Tabs */
        .devui-btn-icon,
        .devui-tab-icon {
            width: 16px;
            height: 16px;
            display: inline-block;
            background-color: currentColor;
            /* Syncs color with parent text color via mask */
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            -webkit-mask-size: contain;
        }

        /* Base Icon Rule for Sub-actions */
        .devui-icon-action {
            width: 14px;
            height: 14px;
            cursor: pointer;
            opacity: 0.6;
            background-color: #252b3a;
            -webkit-mask-size: contain;
            -webkit-mask-position: center;
            -webkit-mask-repeat: no-repeat;
            transition: opacity 0.2s;
        }

        .devui-icon-action:hover {
            opacity: 1;
        }

        /* CSS Mask Image Definitions - ONLY use CSS classes, never inline styles */
        .icon-add {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/new.svg');
        }

        .icon-setting {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/settings.svg');
        }

        .icon-more {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/more-horizontal.svg');
        }

        .icon-list {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/list-view.svg');
        }

        .icon-kanban {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/board-view.svg');
        }

        .icon-close-circle {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/close.svg');
        }

        .icon-save {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/save.svg');
        }

        .icon-folder {
            -webkit-mask-image: url('../../../icon/miniDev-icon/action/folder.svg');
        }


        /* Category Search Specifics */
        .devui-category-search-container {
            flex: 1;
            /* Fill remaining width inside right block */
            background-color: #ffffff;
            border: 1px solid #adb0b8;
            border-radius: 6px;
            /* Elegant 6px border */
            height: 32px;
            padding: 0 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .devui-category-search-container:focus-within {
            border-color: var(--devui-brand);
            box-shadow: 0 0 0 4px rgba(94, 124, 224, 0.08);
            /* Soft blue aura */
        }

        .devui-search-input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 14px;
            color: var(--devui-text);
            min-width: 100px;
        }

        .devui-search-input::placeholder {
            color: #ADB0B8;
        }

        .devui-search-tag {
            display: inline-flex;
            align-items: center;
            height: 20px;
            /* Sophisticated slim height */
            padding: 0 8px;
            background-color: #f2f5fc;
            /* Subtle blue/purple tint */
            border-radius: 4px;
            font-size: 12px;
            color: #252b3a;
            white-space: nowrap;
            gap: 4px;
        }

        .devui-dropdown-trigger {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #252B3A;
            cursor: pointer;
            white-space: nowrap;
            /* Fix width issue */
            flex-shrink: 0;
        }

        .devui-dropdown-trigger .devui-icon-arrow {
            width: 12px;
            height: 12px;
            background-color: currentColor;
            -webkit-mask: url('../../../icon/select-arrow.svg') no-repeat center;
        }

        /* Vertical Divider */
        .devui-divider-vertical {
            width: 1px;
            height: 16px;
            background-color: #DFE1E6;
        }

        .devui-divider-vertical-sm {
            width: 1px;
            height: 12px;
            background-color: #DFE1E6;
            margin: 0 2px;
        }

        /* View Toggle Specifics - Tabs */
        .devui-tabs {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }

        .devui-tabs[data-type="pills"] .devui-tab-item {
            position: relative;
            padding: 8px 0;
            color: #575D6C;
            cursor: pointer;
        }

        .devui-tabs[data-type="pills"] .devui-tab-item.active {
            color: #252B3A;
            font-weight: 700;
        }

        .devui-tabs[data-type="pills"] .devui-tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #252B3A;
            /* Solid black elegant line */
        }

        /* View Toggle Wrapped style */
        .devui-tabs[data-type="wrapped"] {
            gap: 4px;
            background-color: transparent;
        }

        .devui-tabs[data-type="wrapped"] .devui-tab-item {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 4px;
            /* Icon buttons usually rounded square in toggles */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #575D6C;
        }

        .devui-tabs[data-type="wrapped"] .devui-tab-item.active {
            background-color: #E2E2E3;
            color: #252B3A;
        }

        /* Base Button Rule */
        .devui-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 32px;
            padding: 0 12px;
            box-sizing: border-box;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            outline: none;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .devui-btn-primary {
            background-color: #5E7CE0;
            color: #FFFFFF;
        }

        .devui-btn-primary:hover {
            background-color: #7693F5;
            /* Lightened primary */
        }

        .devui-btn-text {
            background-color: transparent;
            color: #252B3A;
            padding: 0;
        }

        .devui-btn-text:hover {
            color: #5E7CE0;
        }

        /* --- Custom added for tag close icon just for safety --- */
        .devui-search-tag .devui-icon-close {
            width: 12px;
            height: 12px;
            background-color: currentColor;
            opacity: 0.6;
            -webkit-mask: url('../../../icon/miniDev-icon/action/close.svg') no-repeat center/contain;
            cursor: pointer;
        }

        .devui-search-tag .devui-icon-close:hover {
            opacity: 1;
        }

        .devui-search-icon {
            width: 16px;
            height: 16px;
            background-color: #ADB0B8;
            -webkit-mask: url('../../../icon/miniDev-icon/action/search.svg') no-repeat center/contain;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="test-container">
        <!-- --- HTML Paste from Spec --- -->
        <div class="devui-block-toolbar">

            <!-- LEFT AREA -->
            <div class="devui-block-left">
                <!-- Scope Filter -->
                <div class="devui-dropdown-trigger">
                    <span>全部</span>
                    <span class="devui-icon-arrow icon-select-arrow"></span> <!-- select-arrow.svg -->
                </div>

                <!-- Navigation Tabs (Pills/Underline) -->
                <div class="devui-tabs" data-type="pills">
                    <div class="devui-tab-item active">Backlog</div>
                    <div class="devui-tab-item">缺陷</div>
                </div>
            </div>

            <!-- RIGHT AREA -->
            <div class="devui-block-right">

                <!-- Divider -->
                <div class="devui-divider-vertical"></div>

                <!-- Main Button -->
                <button class="devui-btn devui-btn-primary">
                    <span class="devui-btn-icon icon-add"></span> <!-- new.svg -->
                    <span>新建</span>
                </button>

                <!-- Temp Filter -->
                <div class="devui-dropdown-trigger">
                    <span>临时过滤</span>
                    <span class="devui-icon-arrow icon-select-arrow"></span>
                </div>

                <!-- Category Search -->
                <div class="devui-category-search-container">
                    <span class="devui-search-icon"></span>
                    <!-- Tags -->
                    <div class="devui-search-tag">
                        <span>类型: Story | Task | Bug</span>
                        <span class="devui-icon-close"></span>
                    </div>
                    <div class="devui-search-tag">
                        <span>状态: 新建 | 进行中 | 已解决...</span>
                        <span class="devui-icon-close"></span>
                    </div>
                    <input type="text" class="devui-search-input" placeholder="点击此处输入关键词...">
                    <!-- Right Actions inside Search -->
                    <div class="devui-search-actions">
                        <span class="devui-icon-action icon-close-circle"></span>
                        <span class="devui-divider-vertical-sm"></span>
                        <span class="devui-icon-action icon-save"></span>
                        <span class="devui-icon-action icon-folder"></span>
                    </div>
                </div>

                <!-- Text Buttons -->
                <button class="devui-btn devui-btn-text">
                    <span class="devui-btn-icon icon-setting"></span>
                    <span>表格设置</span>
                </button>

                <div class="devui-btn-icon icon-more" style="cursor: pointer;"></div>
                <button class="devui-btn devui-btn-text">
                    <span>更多</span>
                </button>

                <!-- Divider -->
                <div class="devui-divider-vertical"></div>

                <!-- View Toggle (Wrapped/Solid) -->
                <div class="devui-tabs" data-type="wrapped">
                    <div class="devui-tab-item active">
                        <span class="devui-tab-icon icon-list"></span>
                    </div>
                    <div class="devui-tab-item">
                        <span class="devui-tab-icon icon-kanban"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
