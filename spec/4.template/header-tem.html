<!-- 
  Header Component Template
  Source: Figma Design (Top Navigation)
  
  Variables (Template Contract):
  - {{logoSrc}}: 'path/to/logo.png'
  - {{logoText}}: '品牌名称'
  - {{navItems}}: HTML slot for navigation items
  - {{userInitials}}: 'HZ' etc.
-->

<style>
    /* Scoped Header Styles */
    .devui-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 48px;
        padding: 0 20px;
        background-color: var(--devui-base-bg, #ffffff);
        box-shadow: 0 1px 0 0 var(--devui-dividing-line, #dfe1e6);
        box-sizing: border-box;
        font-family: inherit;
        position: relative;
        z-index: 1000;
    }

    /* Left Section */
    .devui-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
        flexShrink: 0;
    }

    .devui-header-icon {
        width: 16px;
        height: 16px;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.2s;
        background-color: var(--devui-icon-text, #252b3a);
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
    }

    .devui-header-icon:hover {
        opacity: 1;
        background-color: var(--devui-brand, #5e7ce0);
    }

    .devui-icon-menu {
        -webkit-mask-image: url('../../../icon/miniDev-icon/action/menu.svg');
        mask-image: url('../../../icon/miniDev-icon/action/menu.svg');
    }

    /* Logo */
    .devui-header-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }

    .devui-logo-img {
        height: 24px;
        width: auto;
        /* Default generic logo size */
    }

    .devui-logo-text {
        font-size: 16px;
        font-weight: 700;
        color: var(--devui-text, #252b3a);
        white-space: nowrap;
    }

    /* Divider */
    .devui-header-divider {
        width: 1px;
        height: 14px;
        background-color: var(--devui-dividing-line, #dfe1e6);
        margin: 0 4px;
    }

    /* Navigation */
    .devui-header-nav {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .devui-header-nav-item {
        display: flex;
        align-items: center;
        height: 32px;
        padding: 0 12px;
        gap: 6px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        color: var(--devui-text, #252b3a);
        white-space: nowrap;
        transition: background-color 0.2s, color 0.2s;
    }

    .devui-header-nav-item:hover {
        background-color: var(--devui-list-item-hover-bg, #f2f5fc);
        color: var(--devui-brand, #5e7ce0);
    }

    .devui-header-nav-item:hover .devui-header-nav-icon,
    .devui-header-nav-item:hover .devui-header-nav-arrow {
        background-color: var(--devui-brand, #5e7ce0);
        opacity: 1;
    }

    .devui-header-nav-icon,
    .devui-header-nav-arrow {
        width: 14px;
        height: 14px;
        background-color: var(--devui-icon-text, #252b3a);
        opacity: 0.8;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        transition: background-color 0.2s, opacity 0.2s;
    }

    .devui-icon-arrow-down {
        -webkit-mask-image: url('../../../icon/select-arrow.svg');
        mask-image: url('../../../icon/select-arrow.svg');
        /* specific resize for arrow, usually 12px is better but 14px is fine */
        width: 12px;
        height: 12px;
    }

    /* Right Section */
    .devui-header-right {
        display: flex;
        align-items: center;
        gap: 16px;
        flexShrink: 0;
    }

    .devui-header-action-icon {
        width: 16px;
        height: 16px;
        cursor: pointer;
        opacity: 0.8;
        background-color: var(--devui-icon-text, #252b3a);
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        transition: background-color 0.2s, opacity 0.2s;
    }

    .devui-header-action-icon:hover {
        opacity: 1;
        background-color: var(--devui-brand, #5e7ce0);
    }

    .devui-icon-notification {
        -webkit-mask-image: url('../../../icon/miniDev-icon/action/notification.svg');
        mask-image: url('../../../icon/miniDev-icon/action/notification.svg');
    }

    .devui-icon-task {
        -webkit-mask-image: url('../../../icon/miniDev-icon/action/success.svg');
        mask-image: url('../../../icon/miniDev-icon/action/success.svg');
    }

    /* Language */
    .devui-header-lang {
        font-size: 14px;
        color: var(--devui-text, #252b3a);
        cursor: pointer;
        user-select: none;
    }

    .devui-header-lang:hover {
        color: var(--devui-brand, #5e7ce0);
    }

    /* Avatar */
    .devui-header-avatar {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: var(--devui-brand, #5e7ce0);
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        user-select: none;
    }
</style>

<div class="devui-header">
    <div class="devui-header-left">
        <span class="devui-header-icon devui-icon-menu"></span>
        <div class="devui-header-logo">
            <!-- Add a fallback icon if logoSrc is missing, or rendering literal HTML below -->
            <img class="devui-logo-img" src="{{logoSrc}}" alt="logo" />
            <span class="devui-logo-text">{{logoText}}</span>
        </div>
        <div class="devui-header-divider"></div>
        <div class="devui-header-nav">
            <!-- Navigation Slot -->
            {{navItems}}
        </div>
    </div>
    <div class="devui-header-right">
        <!-- Actions -->
        <span class="devui-header-action-icon devui-icon-notification"></span>
        <span class="devui-header-action-icon devui-icon-task"></span>
        <span class="devui-header-lang">EN</span>
        <div class="devui-header-avatar">{{userInitials}}</div>
    </div>
</div>
